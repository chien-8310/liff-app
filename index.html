<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AirportHUB 駕駛端 (自動追蹤版)</title>
<script src="[https://cdn.tailwindcss.com](https://cdn.tailwindcss.com)"></script>
<script charset="utf-8" src="[https://static.line-scdn.net/liff/edge/2/sdk.js](https://static.line-scdn.net/liff/edge/2/sdk.js)"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans p-6">

<!-- 司機資訊與連線狀態 -->
<div class="bg-white rounded-2xl p-4 shadow flex items-center gap-4 mb-6 mt-4 relative overflow-hidden">
    <div id="status-bar" class="absolute top-0 left-0 w-1 h-full bg-slate-300 transition-colors"></div>
    <img id="profile-img" src="[https://via.placeholder.com/150](https://via.placeholder.com/150)" class="w-16 h-16 bg-slate-200 rounded-full object-cover shadow-inner">
    <div>
        <h3 id="profile-name" class="font-black text-xl text-slate-800">載入中...</h3>
        <p id="status-badge" class="text-blue-500 text-sm font-bold mt-1 flex items-center gap-1">
            <span class="animate-pulse w-2 h-2 rounded-full bg-blue-500 inline-block"></span> 初始化 LIFF 中...
        </p>
    </div>
</div>

<!-- 自動追蹤控制區塊 -->
<div class="bg-white rounded-3xl p-6 shadow-lg border border-slate-100 mb-6 text-center">
    <h4 class="text-xs font-black text-slate-400 uppercase tracking-widest mb-4">GPS 自動回報系統</h4>
    
    <button id="toggle-btn" onclick="toggleTracking()" class="w-full bg-slate-800 text-white py-5 rounded-2xl font-black text-lg shadow-xl active:scale-95 transition-all flex items-center justify-center gap-2">
        ▶️ 開始任務 (每 30 秒回報)
    </button>

    <div class="grid grid-cols-2 gap-4 mt-6">
        <div class="bg-slate-50 p-3 rounded-xl border border-slate-100">
            <p class="text-[10px] font-bold text-slate-400 uppercase mb-1">已傳送次數</p>
            <p id="ping-count" class="font-black text-xl text-slate-700">0 <span class="text-xs font-bold">次</span></p>
        </div>
        <div class="bg-slate-50 p-3 rounded-xl border border-slate-100">
            <p class="text-[10px] font-bold text-slate-400 uppercase mb-1">下次更新倒數</p>
            <p id="countdown-text" class="font-black text-xl text-slate-700">-- <span class="text-xs font-bold">秒</span></p>
        </div>
    </div>
</div>

<!-- 終端機日誌 -->
<div class="p-4 bg-slate-900 rounded-2xl shadow-inner">
    <p class="text-[10px] font-black text-slate-500 mb-2 uppercase tracking-widest">System Log 系統日誌：</p>
    <div id="gps-log" class="text-xs font-mono text-emerald-400 break-words h-24 overflow-y-auto opacity-80 leading-relaxed">
        系統準備就緒，等待開始...
    </div>
</div>

<script>
    // 您的專屬 LIFF ID
    const MY_LIFF_ID = "2009436773-6q68uSQC"; 
    
    let isTracking = false;
    let trackingInterval = null;
    let countdownInterval = null;
    let pingCount = 0;
    let countdown = 30;

    // 1. LIFF 初始化
    async function initializeLiff() {
        try {
            await liff.init({ liffId: MY_LIFF_ID });
            if (!liff.isLoggedIn()) {
                liff.login(); 
                return;
            }
            const profile = await liff.getProfile();
            document.getElementById('profile-name').innerText = profile.displayName;
            document.getElementById('profile-img').src = profile.pictureUrl;
            
            const badge = document.getElementById('status-badge');
            badge.innerHTML = '<span class="w-2 h-2 rounded-full bg-[#00B900] inline-block"></span> LINE 連線成功';
            badge.className = "text-[#00B900] text-sm font-bold mt-1 flex items-center gap-1";
            document.getElementById('status-bar').className = "absolute top-0 left-0 w-1 h-full bg-[#00B900] transition-colors";
        } catch (err) {
            document.getElementById('profile-name').innerText = "連線發生錯誤";
            document.getElementById('status-badge').innerHTML = '❌ ' + (err.message || '未知錯誤');
            document.getElementById('status-badge').className = "text-red-500 text-sm font-bold mt-1 flex items-center gap-1";
            document.getElementById('status-bar').className = "absolute top-0 left-0 w-1 h-full bg-red-500 transition-colors";
            logMessage("❌ 初始化失敗: " + err.message);
        }
    }

    // 2. 切換追蹤狀態 (開始/停止)
    function toggleTracking() {
        const btn = document.getElementById('toggle-btn');
        
        if (!isTracking) {
            isTracking = true;
            btn.innerHTML = '⏹️ 停止任務 (結束回報)';
            btn.className = "w-full bg-red-500 text-white py-5 rounded-2xl font-black text-lg shadow-xl shadow-red-500/30 active:scale-95 transition-all flex items-center justify-center gap-2";
            
            logMessage("▶️ 任務開始！立即執行首次定位...");
            sendLocation(); 
            
            trackingInterval = setInterval(sendLocation, 30000);
            
            countdown = 30;
            document.getElementById('countdown-text').innerHTML = `${countdown} <span class="text-xs font-bold">秒</span>`;
            countdownInterval = setInterval(() => {
                countdown--;
                if(countdown <= 0) countdown = 30;
                document.getElementById('countdown-text').innerHTML = `${countdown} <span class="text-xs font-bold">秒</span>`;
            }, 1000);

        } else {
            isTracking = false;
            clearInterval(trackingInterval);
            clearInterval(countdownInterval);
            
            btn.innerHTML = '▶️ 開始任務 (每 30 秒回報)';
            btn.className = "w-full bg-slate-800 text-white py-5 rounded-2xl font-black text-lg shadow-xl active:scale-95 transition-all flex items-center justify-center gap-2";
            
            document.getElementById('countdown-text').innerHTML = `-- <span class="text-xs font-bold">秒</span>`;
            logMessage("⏹️ 任務結束，停止定位回報。");
        }
    }

    // 3. 獲取定位並「模擬」傳送至戰情室
    function sendLocation() {
        if (!navigator.geolocation) {
            logMessage("❌ 您的裝置不支援 GPS 定位");
            return;
        }

        logMessage("⏳ 正在取得最新 GPS 座標...");

        navigator.geolocation.getCurrentPosition(
            (position) => {
                const lat = position.coords.latitude;
                const lng = position.coords.longitude;
                pingCount++;
                document.getElementById('ping-count').innerHTML = `${pingCount} <span class="text-xs font-bold">次</span>`;
                
                logMessage(`✅ [第 ${pingCount} 次回報] 緯度:${lat.toFixed(5)}, 經度:${lng.toFixed(5)}`);
            },
            (error) => {
                logMessage(`❌ 取得定位失敗: ${error.message}`);
            },
            { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
        );
    }

    function logMessage(msg) {
        const logDiv = document.getElementById('gps-log');
        const time = new Date().toLocaleTimeString('zh-TW', { hour12: false });
        logDiv.innerHTML = `[${time}] ${msg}<br>` + logDiv.innerHTML;
    }

    window.onload = initializeLiff;
</script>
</body>
</html>
